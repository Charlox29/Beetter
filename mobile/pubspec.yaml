name: beetter
description: Beetter — beehive monitoring app for Android and iOS.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.4.3

  # Secure local storage (token, server URL)
  flutter_secure_storage: ^9.2.2

  # Charts
  fl_chart: ^0.68.0

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Background tasks (periodic alert checks)
  workmanager: ^0.5.2

  # Local notifications
  flutter_local_notifications: ^17.2.1

  # Date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
