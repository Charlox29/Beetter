version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: beetter-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    restart: always

  influxdb:
    image: influxdb:2.7
    container_name: beetter-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: always

  telegraf:
    image: telegraf:latest
    container_name: beetter-telegraf
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
    depends_on:
      - mosquitto
      - influxdb
    restart: always

  api:
    build: .
    container_name: beetter-api
    ports:
      - "5000:5000"
    depends_on:
      - influxdb
    restart: always

volumes:
  influxdb-data:
  mosquitto-data:
  mosquitto-log:
