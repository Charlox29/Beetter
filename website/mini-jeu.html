<!DOCTYPE html>
<html lang="fr">
<!--
    BEETTER — Mini-jeu "Chassez les frelons" (mini-jeu.html)
    ───────────────────────────────────────────────────────────
    Voir index.html pour le détail de l'arborescence du projet.
    Scripts utilisés ici :
      js/theme-lang.js   thème clair/sombre + langue FR/EN (partagé)
      js/mini-jeu.js     logique du jeu (spawn, score, game over)
    ───────────────────────────────────────────────────────────
-->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-jeu Beetter</title>

    <link rel="icon" type="image/png" sizes="32x32" href="img/Logo_B.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="no-scroll">

    <nav class="navbar">
        <div class="logo">
            <a href="index.html"><img src="img/Logo_Beetter.svg" alt="Logo_Beetter" class="logo-img"></a>
        </div>
        <div class="nav-controls">
            <a href="index.html" class="nav-link-button lang-fr">Retour</a>
            <a href="index.html" class="nav-link-button lang-en">Back</a>
            <button id="lang-toggle" class="lang-btn" aria-label="Changer de langue">FR | EN</button>
            <button id="theme-toggle" class="theme-btn" aria-label="Basculer le thème">
                <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="is-hidden"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            </button>
        </div>
    </nav>

    <section class="section game-section">
        <div class="container">
                <br>
                <div class="section-header">
                <p class="subtitle lang-fr">Chassez les <strong class="text-hornet">frelons</strong> en évitez les <strong class="text-bee">abeilles</strong></p>
                <p class="subtitle lang-en">Get rid of <strong class="text-hornet">hornets</strong> and avoid the <strong class="text-bee">bees</strong></p>
            </div>

            <div class="hive-stage">
                <div class="hive-graphic" id="hive-graphic">🏠🐝</div>

                <!-- Légende visuelle : indications symboliques, masquée lorsque le jeu est actif. -->
                <div class="game-legend is-hidden" id="game-legend">
                    <p class="lang-fr">Essaye encore !</p>
                    <p class="lang-en">Try again !</p>
                </div>

                <div class="game-panel"> 
                    <div class="score-display" id="score-box">
                        <p>SCORE : </p>
                        <span id="score-val">0</span>
                    </div>
                    <button id="start-game-btn" class="game-btn lang-fr">🎮 Démarrer le jeu</button>
                    <button id="start-game-btn-en" class="game-btn lang-en">🎮 Start game</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Conteneurs volants -->
    <div class="bees-container" id="bees-container"></div>
    <div id="hornets-container"></div>

    <!-- HUD du jeu -->
    <div class="game-hud is-hidden" id="game-hud">
        <div class="hud-element">
            <span class="timer" id="timer">60s</span>
        </div>
        <div class="hud-element wave-badge" id="wave-badge">Vague 1</div>
        <div class="hud-element combo-display" id="combo-display">Combo: 0</div>
    </div>

    <!-- Game Over overlay -->
    <div class="game-over-overlay" id="game-over">
        <div class="game-over-box">
            <h2 class="lang-fr">🐝 Partie terminée !</h2>
            <h2 class="lang-en">🐝 Game over !</h2>
            <!-- Score final et meilleur score -->
            <div class="final-score-block">
                <div class="final-score" id="final-score">0</div>
                <p class="lang-fr game-over-subtitle">points</p>
                <p class="lang-en game-over-subtitle">points</p>
                <div class="best-score-row">
                    <span class="lang-fr">🏆 Meilleur score : </span>
                    <span class="lang-en">🏆 Best score: </span>
                    <strong id="best-score-display">0</strong>
                </div>
            </div>

            <button id="restart-btn" class="game-btn">
                <span class="lang-fr">🔄 Rejouer</span>
                <span class="lang-en">🔄 Play again</span>
            </button>
        </div>
    </div>

    <script src="js/theme-lang.js"></script>
    <script src="js/mini-jeu.js"></script>
</body>
</html>
